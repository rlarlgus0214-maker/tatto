<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명월 타투 어드민</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
    
    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fff; }
    .login-box { background: white; padding: 50px; border-radius: 12px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; }
    .login-icon { font-size: 60px; margin-bottom: 20px; }
    .login-box h1 { font-size: 28px; margin-bottom: 10px; color: #333; }
    .login-box p { font-size: 14px; color: #999; margin-bottom: 30px; }
    .login-box input { padding: 12px; width: 100%; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; }
    .login-box button { padding: 12px; width: 100%; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; }
    .login-box button:hover { background: #5568d3; }
    
    .admin { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header h1 { font-size: 24px; font-weight: 600; }
    .btn-logout { padding: 10px 20px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .btn-logout:hover { background: #e0e0e0; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .stat { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-num { font-size: 32px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 12px; color: #999; margin-top: 8px; font-weight: 500; }
    
    .controls { background: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .controls input { padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; margin-right: 10px; margin-bottom: 15px; font-family: 'Noto Sans KR', sans-serif; }
    .controls button { padding: 10px 15px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; margin-right: 8px; margin-bottom: 15px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .controls button.active { background: #667eea; color: white; border-color: #667eea; }
    
    .table-wrap { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f9f9f9; padding: 15px; text-align: left; font-size: 13px; font-weight: 600; border-bottom: 1px solid #eee; }
    td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d1ecf1; color: #0c5460; }
    .badge-paid { background: #d4edda; color: #155724; }
    .badge-done { background: #e2e3e5; color: #383d41; }
    
    .btn-small { padding: 6px 10px; font-size: 11px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; margin-right: 4px; font-family: 'Noto Sans KR', sans-serif; }
    .btn-small:hover { background: #f5f5f5; }
    .btn-approve { background: #28a745; color: white; border-color: #28a745; }
    .btn-reject { background: #dc3545; color: white; border-color: #dc3545; }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal-box { background: white; padding: 35px; border-radius: 10px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; }
    .modal-box h2 { margin-bottom: 25px; font-size: 20px; }
    .modal-row { display: flex; margin-bottom: 15px; }
    .modal-key { width: 120px; font-weight: 600; color: #666; }
    .modal-val { flex: 1; word-break: break-word; }
    .modal-btn { margin-top: 25px; display: flex; gap: 10px; }
    .modal-btn button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; }
    
    .empty { text-align: center; padding: 50px 20px; color: #999; }
  </style>
</head>
<body>
 
<div class="login" id="loginDiv">
  <div class="login-box">
    <div class="login-icon">🌙</div>
    <h1>명월 타투</h1>
    <p>어드민 로그인</p>
    <input type="password" id="pw" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter') login()">
    <button onclick="login()">로그인</button>
  </div>
</div>
 
<div class="admin" id="adminDiv">
  <div class="header">
    <h1>📋 신청 관리</h1>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="s0">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s1">0</div>
      <div class="stat-label">신청대기</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s2">0</div>
      <div class="stat-label">결제완료</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s3">0</div>
      <div class="stat-label">시술완료</div>
    </div>
  </div>
  
  <div class="controls">
    <input type="text" id="search" placeholder="이름 또는 연락처 검색" onkeyup="filter()">
    <br>
    <button class="active" onclick="setFilter('all')">전체</button>
    <button onclick="setFilter('pending')">신청대기</button>
    <button onclick="setFilter('approved')">승인됨</button>
    <button onclick="setFilter('paid')">결제완료</button>
    <button onclick="setFilter('done')">시술완료</button>
  </div>
  
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>연락처</th>
          <th>스타일</th>
          <th>날짜</th>
          <th>상태</th>
          <th>액션</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>
 
<div class="modal" id="modal" onclick="if(event.target.id==='modal') closeModal()">
  <div class="modal-box">
    <h2 id="mTitle">상세정보</h2>
    <div id="mBody"></div>
    <div class="modal-btn">
      <button onclick="closeModal()" style="background: #f0f0f0; color: #333;">닫기</button>
    </div>
  </div>
</div>
 
<script>
  const URL = 'https://uhckhpfvtpmwvprbkoal.supabase.co';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoY2tocGZ2dHBtd3ZwcmJrb2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODM0NzcsImV4cCI6MjA5NzE1OTQ3N30.rmjd87a0GJV-MIw3y4gIfr0hbltQuvmDOtJ2P5aTxew';
  const PW = 'mywol2025!';
  
  let data = [];
  let filter_status = 'all';
  
  function login() {
    const pw = document.getElementById('pw').value;
    if (pw === PW) {
      sessionStorage.setItem('loggedIn', '1');
      showAdmin();
    } else {
      alert('비밀번호가 틀렸습니다.');
    }
  }
  
  function logout() {
    sessionStorage.removeItem('loggedIn');
    location.reload();
  }
  
  function showAdmin() {
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('adminDiv').style.display = 'block';
    load();
  }
  
  async function load() {
    try {
      const r = await fetch(URL + '/rest/v1/bookings?order=created_at.desc', {
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY }
      });
      data = await r.json();
      updateStats();
      filter();
    } catch (e) {
      alert('데이터 로드 실패: ' + e.message);
    }
  }
  
  function updateStats() {
    document.getElementById('s0').textContent = data.length;
    document.getElementById('s1').textContent = data.filter(x => x.status === 'pending').length;
    document.getElementById('s2').textContent = data.filter(x => x.status === 'paid').length;
    document.getElementById('s3').textContent = data.filter(x => x.status === 'done').length;
  }
  
  function setFilter(s) {
    filter_status = s;
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    filter();
  }
  
  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    let arr = data;
    
    if (filter_status !== 'all') arr = arr.filter(x => x.status === filter_status);
    if (q) arr = arr.filter(x => (x.customer_name || '').toLowerCase().includes(q) || (x.customer_phone || '').toLowerCase().includes(q));
    
    renderTable(arr);
  }
  
  function renderTable(arr) {
    const tb = document.getElementById('tbody');
    if (!arr.length) {
      tb.innerHTML = '<tr><td colspan="6" class="empty">신청이 없습니다.</td></tr>';
      return;
    }
    
    tb.innerHTML = arr.map(x => `
      <tr>
        <td>${x.customer_name || '-'}</td>
        <td>${x.customer_phone || '-'}</td>
        <td>${x.style || '-'}</td>
        <td>${x.booking_date || '-'}</td>
        <td><span class="badge badge-${x.status || 'pending'}">${getLabel(x.status)}</span></td>
        <td>
          <button class="btn-small" onclick="openDetail(${x.id})">상세</button>
          ${x.status === 'pending' ? `
            <button class="btn-small btn-approve" onclick="changeStatus(${x.id}, 'approved')">승인</button>
            <button class="btn-small btn-reject" onclick="changeStatus(${x.id}, 'cancel')">거절</button>
          ` : `
            <button class="btn-small" onclick="changeStatus(${x.id}, '${getNext(x.status)}')">다음</button>
          `}
        </td>
      </tr>
    `).join('');
  }
  
  function getLabel(s) {
    const map = { pending: '신청대기', approved: '승인됨', paid: '결제완료', done: '시술완료', cancel: '취소' };
    return map[s] || s;
  }
  
  function getNext(s) {
    const map = { approved: 'paid', paid: 'done', done: 'cancel', cancel: 'pending' };
    return map[s] || 'paid';
  }
  
  function openDetail(id) {
    const x = data.find(d => d.id === id);
    if (!x) return;
    
    document.getElementById('mTitle').textContent = (x.customer_name || '고객') + ' - 상세정보';
    document.getElementById('mBody').innerHTML = `
      <div class="modal-row"><div class="modal-key">신청일시</div><div class="modal-val">${new Date(x.created_at).toLocaleString('ko-KR')}</div></div>
      <div class="modal-row"><div class="modal-key">이름</div><div class="modal-val">${x.customer_name || '-'}</div></div>
      <div class="modal-row"><div class="modal-key">연락처</div><div class="modal-val">${x.customer_phone || '-'}</div></div>
      <div class="modal-row"><div class="modal-key">나이</div><div class="modal-val">${x.customer_age || '-'}세</div></div>
      <div class="modal-row"><div class="modal-key">인스타</div><div class="modal-val">${x.customer_insta || '-'}</div></div>
      <div class="modal-row"><div class="modal-key">스타일</div><div class="modal-val">${x.style || '-'}</div></div>
      <div class="modal-row"><div class="modal-key">부위</div><div class="modal-val">${x.body_part || '-'}</div></div>
      <div class="modal-row"><div class="modal-key">사이즈</div><div class="modal-val">${x.width_cm && x.height_cm ? x.width_cm + 'cm × ' + x.height_cm + 'cm' : '-'}</div></div>
      <div class="modal-row"><div class="modal-key">날짜/타임</div><div class="modal-val">${x.booking_date || '-'} ${x.booking_time === '12:00' ? '오전(12~16시)' : x.booking_time === '16:00' ? '오후(16~20시)' : ''}</div></div>
      <div class="modal-row"><div class="modal-key">예상견적</div><div class="modal-val">${x.estimated_price ? x.estimated_price.toLocaleString() + '원' : '-'}</div></div>
      <div class="modal-row"><div class="modal-key">예약금</div><div class="modal-val">${x.deposit ? x.deposit.toLocaleString() + '원' : '-'}</div></div>
      <div class="modal-row"><div class="modal-key">상태</div><div class="modal-val"><span class="badge badge-${x.status}">${getLabel(x.status)}</span></div></div>
      <div class="modal-row"><div class="modal-key">설명</div><div class="modal-val">${x.description || '-'}</div></div>
    `;
    
    document.getElementById('modal').classList.add('open');
  }
  
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  
  function changeStatus(id, status) {
    if (!confirm('상태를 "' + getLabel(status) + '"로 변경할까요?')) return;
    
    const body = JSON.stringify({ status: status });
    
    fetch(URL + '/rest/v1/bookings?id=eq.' + id, {
      method: 'PATCH',
      headers: { 
        'apikey': KEY, 
        'Authorization': 'Bearer ' + KEY, 
        'Content-Type': 'application/json'
      },
      body: body
    })
    .then(r => r.json())
    .then(d => {
      alert('상태가 변경되었습니다.');
      load();
      closeModal();
    })
    .catch(e => {
      alert('오류 발생: ' + e.message);
      console.error(e);
    });
  }
  
  if (sessionStorage.getItem('loggedIn') === '1') showAdmin();
</script>
 
</body>
</html>
