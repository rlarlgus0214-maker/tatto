<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명월 어드민</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@400;600&display=swap');
  :root {
    --purple: #7F77DD; --purple-dark: #3C3489; --purple-light: #EEEDFE;
    --teal: #1D9E75; --teal-light: #E1F5EE; --coral: #D85A30;
    --text: #1a1a1a; --text-muted: #666; --text-hint: #999;
    --border: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.18);
    --bg: #fff; --bg-soft: #f8f7ff; --radius: 12px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg-soft); min-height: 100vh; }

  /* ── 로그인 ── */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-box { background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--radius); padding: 40px 28px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(127,119,221,0.08); }
  .login-logo { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text-hint); margin-bottom: 28px; }
  .login-label { font-size: 12px; color: var(--text-hint); text-align: left; display: block; margin-bottom: 6px; }
  .login-input { width: 100%; padding: 13px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg); margin-bottom: 12px; }
  .login-input:focus { outline: none; border-color: var(--purple); }
  .login-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--purple); color: #fff; font-size: 15px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .login-btn:active { opacity: 0.85; }
  .login-err { color: var(--coral); font-size: 12px; margin-top: 10px; display: none; }

  /* ── 어드민 레이아웃 ── */
  .adm { display: none; }
  .adm.visible { display: block; }

  .adm-header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .adm-header-left { display: flex; align-items: center; gap: 10px; }
  .adm-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; }
  .adm-date { font-size: 12px; color: var(--text-hint); }
  .adm-logout { padding: 7px 14px; border-radius: 999px; border: 0.5px solid var(--border-mid); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

  /* ── 통계 ── */
  .adm-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px; }
  .stat-card { background: var(--bg); border-radius: var(--radius-sm); padding: 16px 14px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text-hint); letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-family: 'Noto Serif KR', serif; font-size: 26px; color: var(--text); }
  .stat-value.accent { color: var(--purple); }

  /* ── 필터 ── */
  .adm-filters { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .adm-filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 7px 16px; border-radius: 999px; border: 0.5px solid var(--border-mid); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; min-height: 36px; flex-shrink: 0; }
  .filter-btn.on { background: var(--purple); color: #fff; border-color: var(--purple); }

  /* ── 검색 ── */
  .adm-search { padding: 0 16px 12px; }
  .adm-search input { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg); }
  .adm-search input:focus { outline: none; border-color: var(--purple); }

  /* ── 카드 목록 ── */
  .adm-list { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 10px; }
  .adm-empty { text-align: center; padding: 56px 0; color: var(--text-hint); font-size: 14px; }

  .res-card { background: var(--bg); border-radius: var(--radius-sm); border: 0.5px solid var(--border); overflow: hidden; }
  .res-card-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 14px 10px; }
  .res-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .res-meta { font-size: 11px; color: var(--text-hint); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .badge-pending { background: #FFF3E0; color: #E65100; border: 0.5px solid #FFCC80; }
  .badge-paid    { background: #E8F5E9; color: #2E7D32; border: 0.5px solid #A5D6A7; }
  .badge-done    { background: var(--purple-light); color: var(--purple-dark); border: 0.5px solid #C5C1F5; }
  .badge-cancel  { background: #FBE9E7; color: var(--coral); border: 0.5px solid #FFAB91; }
  .res-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; padding: 0 14px 10px; font-size: 12px; color: var(--text-muted); }
  .res-info-item { display: flex; gap: 4px; align-items: baseline; }
  .res-info-item b { color: var(--text); font-weight: 400; }
  .res-deposit { padding: 10px 14px; background: var(--purple-light); border-top: 0.5px solid rgba(127,119,221,0.15); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .res-deposit-label { color: var(--purple-dark); font-size: 11px; }
  .res-deposit-amt { font-family: 'Noto Serif KR', serif; font-size: 16px; color: var(--purple-dark); font-weight: 600; }
  .res-actions { display: flex; gap: 6px; padding: 10px 14px; border-top: 0.5px solid var(--border); }
  .act-btn { padding: 8px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; min-height: 36px; }
  .act-btn.primary { background: var(--purple); color: #fff; border-color: var(--purple); flex: 1; }
  .act-btn.teal { background: var(--teal); color: #fff; border-color: var(--teal); }
  .act-btn.danger { color: var(--coral); border-color: rgba(216,90,48,0.25); }

  /* ── 상세 모달 (바텀시트) ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 8px 16px 48px; }
  .modal-handle { width: 36px; height: 4px; background: var(--border-mid); border-radius: 2px; margin: 12px auto 16px; }
  .modal-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .modal-badge-row { margin-bottom: 18px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; font-weight: 500; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--text-hint); font-size: 12px; flex-shrink: 0; padding-top: 1px; }
  .detail-val { color: var(--text); text-align: right; word-break: break-all; line-height: 1.5; }
  .design-img { width: 100%; border-radius: var(--radius-sm); object-fit: cover; max-height: 240px; margin-top: 8px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions .act-btn { flex: 1; text-align: center; }

  /* ── 로딩 스피너 ── */
  .spinner-wrap { text-align: center; padding: 48px 0; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--purple-light); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 새로고침 버튼 ── */
  .adm-refresh { padding: 7px 12px; border-radius: 999px; border: 0.5px solid var(--border-mid); background: var(--bg); font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .adm-refresh:active { background: var(--bg-soft); }

  /* ── 승인/거절 ── */
  .badge-approved { background: #E3F2FD; color: #1565C0; border: 0.5px solid #90CAF9; }
  .act-btn.approve { background: var(--teal); color: #fff; border-color: var(--teal); }
  .act-btn.reject  { color: var(--coral); border-color: rgba(216,90,48,0.25); }

  /* ── 결제링크 모달 ── */
  .link-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  .link-modal-bg.open { display: flex; }
  .link-modal { background: var(--bg); border-radius: var(--radius); width: 100%; max-width: 360px; padding: 28px 20px; text-align: center; }
  .link-modal-icon { font-size: 36px; margin-bottom: 12px; }
  .link-modal-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .link-modal-sub { font-size: 13px; color: var(--text-hint); margin-bottom: 20px; line-height: 1.6; }
  .link-box { background: var(--bg-soft); border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 12px; color: var(--text-muted); word-break: break-all; text-align: left; margin-bottom: 12px; line-height: 1.6; }
  .link-modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .link-copy-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--purple); color: #fff; font-size: 14px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .link-copy-btn:active { opacity: 0.85; }
  .link-close-btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: var(--bg); color: var(--text-muted); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .link-info { font-size: 11px; color: var(--text-hint); margin-top: 12px; line-height: 1.7; }
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">명월</div>
    <div class="login-sub">예약 관리 어드민</div>
    <label class="login-label">비밀번호</label>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 어드민 화면 ── -->
<div id="admWrap" class="adm">

  <!-- 헤더 -->
  <div class="adm-header">
    <div class="adm-header-left">
      <div class="adm-title">예약 관리</div>
      <div class="adm-date" id="todayDate"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="adm-refresh" onclick="loadAll()">↻ 새로고침</button>
      <button class="adm-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 통계 카드 -->
  <div class="adm-stats">
    <div class="stat-card">
      <div class="stat-label">전체 예약</div>
      <div class="stat-value" id="sTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">신청 대기</div>
      <div class="stat-value" id="sPending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">결제 완료</div>
      <div class="stat-value accent" id="sPaid">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">이번달 예약금</div>
      <div class="stat-value accent" id="sRevenue">—</div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="adm-search">
    <input type="text" id="searchInput" placeholder="이름 또는 연락처로 검색" oninput="applyFilter()">
  </div>

  <!-- 필터 -->
  <div class="adm-filters">
    <button class="filter-btn on" data-status="all"      onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn"    data-status="pending"   onclick="setFilter('pending',this)">신청대기</button>
    <button class="filter-btn"    data-status="approved"  onclick="setFilter('approved',this)">승인됨</button>
    <button class="filter-btn"    data-status="paid"      onclick="setFilter('paid',this)">결제완료</button>
    <button class="filter-btn"    data-status="done"      onclick="setFilter('done',this)">시술완료</button>
    <button class="filter-btn"    data-status="cancel"    onclick="setFilter('cancel',this)">취소</button>
  </div>

  <!-- 예약 목록 -->
  <div class="adm-list" id="admList">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── 상세 모달 ── -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalName"></div>
    <div class="modal-badge-row" id="modalBadge"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- ── 결제링크 모달 ── -->
<div class="link-modal-bg" id="linkModalBg" onclick="if(event.target===this)closeLinkModal()">
  <div class="link-modal">
    <div class="link-modal-icon">✅</div>
    <div class="link-modal-title" id="linkModalTitle">승인 완료</div>
    <div class="link-modal-sub" id="linkModalSub"></div>
    <div class="link-box" id="linkBox"></div>
    <div class="link-modal-btns">
      <button class="link-copy-btn" id="linkCopyBtn" onclick="copyLink()">링크 복사하기</button>
      <button class="link-close-btn" onclick="closeLinkModal()">닫기</button>
    </div>
    <div class="link-info" id="linkInfo"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://uhckhpfvtpmwvprbkoal.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoY2tocGZ2dHBtd3ZwcmJrb2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODM0NzcsImV4cCI6MjA5NzE1OTQ3N30.rmjd87a0GJV-MIw3y4gIfr0hbltQuvmDOtJ2P5aTxew';

  /* ── 비밀번호 변경은 여기서 ── */
  const ADMIN_PW = 'mywol2025!';

  const STATUS_LABEL = { pending: '신청대기', approved: '승인됨', paid: '결제완료', done: '시술완료', cancel: '취소' };
  const STATUS_BADGE = { pending: 'badge-pending', approved: 'badge-approved', paid: 'badge-paid', done: 'badge-done', cancel: 'badge-cancel' };
  const STATUS_CYCLE = ['pending', 'approved', 'paid', 'done', 'cancel'];

  let allData = [];
  let curFilter = 'all';

  /* ════════════════════════════════
     로그인
  ════════════════════════════════ */
  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PW) {
      sessionStorage.setItem('mywol_admin', '1');
      document.getElementById('loginWrap').style.display = 'none';
      showAdmin();
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem('mywol_admin');
    location.reload();
  }

  /* ════════════════════════════════
     어드민 초기화
  ════════════════════════════════ */
  function showAdmin() {
    document.getElementById('admWrap').classList.add('visible');
    const now = new Date();
    document.getElementById('todayDate').textContent =
      now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');
    loadAll();
  }

  /* ════════════════════════════════
     데이터 로드
  ════════════════════════════════ */
  async function loadAll() {
    document.getElementById('admList').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/bookings?select=*&order=created_at.desc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    allData = res.ok ? await res.json() : [];
    renderStats();
    applyFilter();
  }

  /* ════════════════════════════════
     통계
  ════════════════════════════════ */
  function renderStats() {
    const now = new Date();
    const thisMonth = allData.filter(r => {
      if (r.status !== 'paid' || !r.created_at) return false;
      const d = new Date(r.created_at);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
    const revenue = thisMonth.reduce((s, r) => s + (r.deposit || 0), 0);

    document.getElementById('sTotal').textContent   = allData.length;
    document.getElementById('sPending').textContent = allData.filter(r => r.status === 'pending').length;
    document.getElementById('sPaid').textContent    = allData.filter(r => r.status === 'paid').length;
    document.getElementById('sRevenue').textContent =
      revenue ? (revenue / 10000).toFixed(0) + '만원' : '0원';
  }

  /* ════════════════════════════════
     필터 / 검색
  ════════════════════════════════ */
  function setFilter(status, btn) {
    curFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    applyFilter();
  }

  function applyFilter() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let rows = curFilter === 'all' ? allData : allData.filter(r => r.status === curFilter);
    if (q) rows = rows.filter(r =>
      (r.customer_name || '').toLowerCase().includes(q) ||
      (r.customer_phone || '').replace(/-/g,'').includes(q.replace(/-/g,''))
    );
    renderList(rows);
  }

  /* ════════════════════════════════
     목록 렌더링
  ════════════════════════════════ */
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderList(rows) {
    const el = document.getElementById('admList');
    if (!rows.length) {
      el.innerHTML = '<div class="adm-empty">예약이 없습니다.</div>';
      return;
    }
    el.innerHTML = rows.map(r => {
      const timeLabel = r.booking_time === '12:00' ? '오전(12~16시)' : r.booking_time === '16:00' ? '오후(16~20시)' : '';
      const dateStr = [r.booking_date, timeLabel].filter(Boolean).join(' · ');
      const isPending = r.status === 'pending';

      return `
      <div class="res-card">
        <div class="res-card-top">
          <div>
            <div class="res-name">${r.customer_name || '이름 없음'}</div>
            <div class="res-meta">${fmtDate(r.created_at)} · ${r.customer_phone || '—'}</div>
          </div>
          <span class="badge ${STATUS_BADGE[r.status] || ''}">${STATUS_LABEL[r.status] || r.status}</span>
        </div>
        <div class="res-info">
          <div class="res-info-item">스타일 <b>${r.style || '—'}</b></div>
          <div class="res-info-item">부위 <b>${r.body_part || '—'}</b></div>
          <div class="res-info-item">사이즈 <b>${r.width_cm && r.height_cm ? r.width_cm+'×'+r.height_cm+'cm' : '—'}</b></div>
          <div class="res-info-item">날짜 <b>${dateStr || '—'}</b></div>
        </div>
        ${r.deposit ? `
        <div class="res-deposit">
          <div class="res-deposit-label">예약금</div>
          <div class="res-deposit-amt">${r.deposit.toLocaleString()}원</div>
        </div>` : ''}
        <div class="res-actions">
          <button class="act-btn" onclick="openDetail(${r.id})">상세</button>
          ${isPending ? `
            <button class="act-btn approve" onclick="approveRes(${r.id})">✓ 승인</button>
            <button class="act-btn reject"  onclick="rejectRes(${r.id})">✕ 거절</button>
          ` : `
            <button class="act-btn primary" onclick="nextStatus(${r.id},'${r.status}')">
              → ${STATUS_LABEL[STATUS_CYCLE[(STATUS_CYCLE.indexOf(r.status)+1) % STATUS_CYCLE.length]]}
            </button>
          `}
          <button class="act-btn danger" onclick="deleteRes(${r.id})">삭제</button>
        </div>
      </div>`;
    }).join('');
  }

  /* ════════════════════════════════
     승인
  ════════════════════════════════ */
  let currentPayLink = '';

  async function approveRes(id) {
    const r = allData.find(x => x.id == id);
    if (!r) return;

    // 상태 approved로 변경
    await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'approved' })
    });

    // 토스페이먼츠 결제링크 생성 (테스트용 — 라이브 전환 후 실제 링크로 교체)
    const orderId  = 'mywol-' + id + '-' + Date.now();
    const amount   = r.deposit || 50000;
    const baseUrl  = 'https://myeongwl.netlify.app';
    const payLink  = `https://pay.toss.im/payments/new?orderId=${orderId}&amount=${amount}&orderName=${encodeURIComponent('명월 타투 예약금')}&successUrl=${encodeURIComponent(baseUrl + '?success=true&bookingId=' + id)}&failUrl=${encodeURIComponent(baseUrl + '?fail=true')}&clientKey=test_ck_yZqmkKeP8gBWgRmYdYRKrbQRxB9l`;

    const timeLabel = r.booking_time === '12:00' ? '오전 타임 (12:00~16:00)' : r.booking_time === '16:00' ? '오후 타임 (16:00~20:00)' : '';

    currentPayLink = payLink;
    document.getElementById('linkModalTitle').textContent = r.customer_name + '님 승인 완료';
    document.getElementById('linkModalSub').innerHTML =
      `<b>${r.booking_date || ''} ${timeLabel}</b><br>예약금 <b>${amount.toLocaleString()}원</b> 결제 링크를 복사해서<br>카카오톡으로 보내주세요.`;
    document.getElementById('linkBox').textContent = payLink;
    document.getElementById('linkInfo').innerHTML =
      `📋 링크를 복사한 뒤 ${r.customer_name}님께<br>카카오톡 또는 문자로 전달해 주세요.<br><br>` +
      `📱 <b>${r.customer_phone || '연락처 없음'}</b>`;
    document.getElementById('linkCopyBtn').textContent = '링크 복사하기';

    closeModal();
    document.getElementById('linkModalBg').classList.add('open');
    await loadAll();
  }

  function copyLink() {
    navigator.clipboard.writeText(currentPayLink).then(() => {
      document.getElementById('linkCopyBtn').textContent = '✓ 복사됐어요!';
      setTimeout(() => {
        document.getElementById('linkCopyBtn').textContent = '링크 복사하기';
      }, 2000);
    }).catch(() => {
      // clipboard API 실패 시 fallback
      const ta = document.createElement('textarea');
      ta.value = currentPayLink;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      document.getElementById('linkCopyBtn').textContent = '✓ 복사됐어요!';
      setTimeout(() => {
        document.getElementById('linkCopyBtn').textContent = '링크 복사하기';
      }, 2000);
    });
  }

  function closeLinkModal() {
    document.getElementById('linkModalBg').classList.remove('open');
  }

  /* ════════════════════════════════
     거절
  ════════════════════════════════ */
  async function rejectRes(id) {
    const r = allData.find(x => x.id == id);
    if (!r) return;
    const reason = prompt(`${r.customer_name}님 거절 사유를 입력해 주세요.\n(손님에게 전달할 메시지)`);
    if (reason === null) return; // 취소
    await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'cancel', reject_reason: reason })
    });
    // 거절 메시지 클립보드 복사
    const msg = `안녕하세요 ${r.customer_name}님, 명월입니다.\n아쉽게도 이번 예약 신청은 어려울 것 같아요.\n사유: ${reason || '일정 조율 어려움'}\n\n인스타 DM으로 추가 문의 주세요 :)\n@yangmyeongwol.tt`;
    navigator.clipboard.writeText(msg).catch(() => {});
    alert(`거절 처리됐어요.\n아래 메시지가 클립보드에 복사됐습니다.\n카카오톡으로 전달해 주세요.\n\n"${msg}"`);
    closeModal();
    await loadAll();
  }

  /* ════════════════════════════════
     상태 변경 (승인됨 이후)
  ════════════════════════════════ */
  async function nextStatus(id, current) {
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current)+1) % STATUS_CYCLE.length];
    if (!confirm(`"${STATUS_LABEL[current]}" → "${STATUS_LABEL[next]}" 으로 변경할까요?`)) return;
    await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: next })
    });
    closeModal();
    await loadAll();
  }

  /* ════════════════════════════════
     삭제
  ════════════════════════════════ */
  async function deleteRes(id) {
    if (!confirm('예약을 삭제할까요? 되돌릴 수 없습니다.')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY }
    });
    closeModal();
    await loadAll();
  }

  /* ════════════════════════════════
     상세 모달
  ════════════════════════════════ */
  function openDetail(id) {
    const r = allData.find(x => x.id == id);
    if (!r) return;

    document.getElementById('modalName').textContent = r.customer_name || '이름 없음';
    document.getElementById('modalBadge').innerHTML =
      `<span class="badge ${STATUS_BADGE[r.status]}">${STATUS_LABEL[r.status]}</span>`;

    const rows = [
      ['신청일시', r.created_at ? new Date(r.created_at).toLocaleString('ko-KR') : '—'],
      ['연락처',   r.customer_phone || '—'],
      ['나이',     r.customer_age ? r.customer_age + '세' : '—'],
      ['인스타',   r.customer_insta || '—'],
      ['스타일',   r.style || '—'],
      ['부위',     r.body_part || '—'],
      ['사이즈',   r.width_cm && r.height_cm ? `${r.width_cm} × ${r.height_cm} cm` : '—'],
      ['날짜',     r.booking_date || '—'],
      ['타임',     r.booking_time === '12:00' ? '오전 타임 (12:00~16:00)' : r.booking_time === '16:00' ? '오후 타임 (16:00~20:00)' : '—'],
      ['도안 설명', r.description || '—'],
      ['예상 견적', r.estimated_price ? r.estimated_price.toLocaleString() + '원' : '—'],
      ['예약금',   r.deposit ? `<b style="color:var(--purple)">${r.deposit.toLocaleString()}원</b>` : '—'],
    ];

    document.getElementById('modalBody').innerHTML =
      rows.map(([k,v]) => `
        <div class="detail-row">
          <span class="detail-key">${k}</span>
          <span class="detail-val">${v}</span>
        </div>`).join('') +
      (r.design_image_url
        ? `<img class="design-img" src="${r.design_image_url}" alt="도안 이미지">`
        : '');

    const isPending = r.status === 'pending';
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(r.status)+1) % STATUS_CYCLE.length];
    document.getElementById('modalActions').innerHTML = isPending ? `
      <button class="act-btn approve" style="flex:1" onclick="approveRes(${r.id})">✓ 승인 + 링크 복사</button>
      <button class="act-btn reject"  onclick="rejectRes(${r.id})">✕ 거절</button>
      <button class="act-btn danger"  onclick="deleteRes(${r.id})">삭제</button>
    ` : `
      <button class="act-btn primary" style="flex:1" onclick="nextStatus(${r.id},'${r.status}')">→ ${STATUS_LABEL[next]}</button>
      <button class="act-btn danger"  onclick="deleteRes(${r.id})">삭제</button>
    `;

    document.getElementById('modalBg').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('open');
  }

  /* ════════════════════════════════
     자동 로그인 (세션 유지)
  ════════════════════════════════ */
  if (sessionStorage.getItem('mywol_admin') === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    showAdmin();
  }
</script>
</body>
</html>
